<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rituals — Astro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-dark navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">Astro</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="books.html">Books</a></li>
                    <li class="nav-item"><a class="nav-link active" href="rituals.html">Rituals</a></li>
                    <li class="nav-item"><a class="nav-link" href="kundali.html" id="nav-kundali" style="display:none">Kundali</a></li>
                    <li class="nav-item"><a class="nav-link active" href="priests-list.html">Priest</a></li>
                    <li class="nav-item"><a class="nav-link active" href="chat.html">Chat</a></li>
                    <li class="nav-item"><a class="nav-link active" href="profile.html">Profile</a></li>

                    <li class="nav-item"><a class="nav-link" href="login.html" id="nav-login">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="nav-logout" style="display:none" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h3 class="section-title">🪔 Rituals & Mantras</h3>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-4">
            <li class="nav-item">
                <button class="nav-link active" onclick="showTab('rituals')">Rituals</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="showTab('mantras')">Mantras</button>
            </li>
        </ul>

        <!-- Search -->
        <div class="input-group mb-4">
            <input type="text" id="search-input" class="form-control" placeholder="Search...">
            <button class="btn btn-danger" onclick="doSearch()">Search</button>
            <button class="btn btn-outline-secondary" onclick="clearSearch()">Clear</button>
        </div>

        <!-- Loading -->
        <div id="loading" class="spinner-wrap">
            <div class="spinner-border text-danger"></div>
        </div>

        <!-- Rituals List -->
        <div id="rituals-section">
            <div id="rituals-list" class="d-none"></div>
        </div>

        <!-- Mantras List -->
        <div id="mantras-section" class="d-none">
            <div id="mantras-list"></div>
        </div>
    </div>

    <!-- Ritual Detail Modal -->
    <div class="modal fade" id="ritualModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title" id="modal-title">Ritual Detail</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6">
                            <h6 class="fw-bold text-danger">Steps</h6>
                            <ol id="modal-steps" class="ps-3"></ol>
                        </div>
                        <div class="col-md-6">
                            <h6 class="fw-bold text-danger">Required Items (Samagri)</h6>
                            <ul id="modal-items" class="ps-3"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let currentTab = "rituals";

        function showTab(tab) {
            currentTab = tab;
            document.querySelectorAll(".nav-link").forEach(el => el.classList.remove("active"));
            event.target.classList.add("active");
            document.getElementById("rituals-section").classList.toggle("d-none", tab !== "rituals");
            document.getElementById("mantras-section").classList.toggle("d-none", tab !== "mantras");
            doSearch();
        }

        function doSearch() {
            const q = document.getElementById("search-input").value.trim();
            if (currentTab === "rituals") loadRituals(q);
            else loadMantras(q);
        }

        function clearSearch() {
            document.getElementById("search-input").value = "";
            doSearch();
        }

        async function loadRituals(search = "") {
            document.getElementById("loading").classList.remove("d-none");
            document.getElementById("rituals-list").classList.add("d-none");

            const data = await getRituals(search);
            const rituals = data.results || data;

            document.getElementById("loading").classList.add("d-none");
            document.getElementById("rituals-list").classList.remove("d-none");

            document.getElementById("rituals-list").innerHTML = rituals.length === 0
                ? `<div class="alert alert-info">No rituals found.</div>`
                : rituals.map(r => `
                    <div class="card book-card mb-3">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h5 class="card-title">${r.name}</h5>
                                    <span class="badge bg-danger">${r.category}</span>
                                    <span class="badge bg-secondary ms-1">${r.duration_minutes} mins</span>
                                    <p class="mt-2 text-muted small">${r.description}</p>
                                </div>
                                <button class="btn btn-outline-danger btn-sm"
                                        onclick='showRitualDetail(${JSON.stringify(r)})'>
                                    View Steps
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
        }

        async function loadMantras(search = "") {
            document.getElementById("loading").classList.remove("d-none");

            const data = await getMantras(search);
            const mantras = data.results || data;

            document.getElementById("loading").classList.add("d-none");

            document.getElementById("mantras-list").innerHTML = mantras.length === 0
                ? `<div class="alert alert-info">No mantras found.</div>`
                : mantras.map(m => `
                    <div class="card book-card mb-3">
                        <div class="card-body">
                            <h5 class="card-title">${m.name}</h5>
                            <span class="badge bg-secondary">${m.language}</span>
                            <p class="mt-3" style="font-size:1.1rem;color:#8B0000;font-style:italic;">
                                ${m.text}
                            </p>
                            ${m.meaning
                                ? `<p class="text-muted small">${m.meaning}</p>`
                                : ''}
                            ${m.audio
                                ? `<audio controls class="w-100 mt-2">
                                       <source src="${m.audio}">
                                   </audio>`
                                : ''}
                        </div>
                    </div>
                `).join('');
        }

        function showRitualDetail(ritual) {
            document.getElementById("modal-title").textContent = ritual.name;

            const steps = Array.isArray(ritual.steps) ? ritual.steps : [];
            document.getElementById("modal-steps").innerHTML =
                steps.map(s => `<li class="mb-1">${s}</li>`).join('');

            const items = Array.isArray(ritual.required_items) ? ritual.required_items : [];
            document.getElementById("modal-items").innerHTML =
                items.map(i => `<li class="mb-1">${i}</li>`).join('');

            new bootstrap.Modal(document.getElementById("ritualModal")).show();
        }

        // Load rituals on start
        loadRituals();
    </script>
</body>
</html>
