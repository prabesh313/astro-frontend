<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Schedule — Karmakanda Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .schedule-card {
            background: var(--color-background-primary);
            border-left: 4px solid #8B0000;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .schedule-card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .schedule-date {
            font-size: 20px;
            font-weight: 700;
            color: #8B0000;
        }

        .schedule-event {
            font-size: 14px;
            color: var(--color-text-secondary);
            margin-top: 4px;
        }

        .schedule-notes-link {
            border: 0;
            background: transparent;
            padding: 0;
            text-align: left;
            color: #8B0000;
            font-weight: 600;
            cursor: pointer;
        }

        .schedule-notes-link:hover {
            text-decoration: underline;
        }

        .detail-grid {
            display: grid;
            gap: 12px;
        }

        .detail-item {
            background: var(--color-background-secondary);
            border: 1px solid var(--color-border-tertiary);
            border-radius: 8px;
            padding: 12px 14px;
        }

        .detail-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--color-text-secondary);
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 15px;
            color: var(--color-text-primary);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .schedule-actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit, .btn-delete {
            font-size: 12px;
            padding: 6px 12px;
        }

        .form-section {
            background: var(--color-background-secondary);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .form-section h4 {
            color: #8B0000;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--color-border-tertiary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .calendar-day:hover {
            background: #fff8f0;
            border-color: #8B0000;
        }

        .calendar-day.selected {
            background: #8B0000;
            color: white;
        }

        .calendar-day.busy {
            background: #ffcccc;
            border-color: #8B0000;
        }

        .loading-spinner {
            text-align: center;
            padding: 2rem;
        }

        .spinner-border {
            color: #8B0000;
        }

        .no-schedule {
            text-align: center;
            padding: 2rem;
            color: var(--color-text-secondary);
        }

        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
        }

        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html"> Astro</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="priests-list.html">Priests</a></li>
                    <li class="nav-item"><a class="nav-link active" href="schedule.html">My Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="chats.html">Chats</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="section-title"> My Schedule </h2>

        <div id="success-msg" class="success-msg"></div>
        <div id="error-msg" class="error-msg"></div>

        <div class="form-section">
            <h4>Add Busy Date</h4>

            <div class="row">
                <div class="col-md-4">
                    <label class="form-label">Busy Date</label>
                    <input type="date" id="busy_date" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Event Type</label>
                    <select id="event_type" class="form-select">
                        <option value="vivah">विवाह (Marriage)</option>
                        <option value="satyanarayan">सत्यनारायण पूजा</option>
                        <option value="griha_pravesh">गृह प्रवेश (House Warming)</option>
                        <option value="janai">जनै</option>
                        <option value="annaprashan">अन्नप्राशन</option>
                        <option value="upanayan">उपनयन</option>
                        <option value="shradh">श्राद्ध</option>
                        <option value="other">अन्य</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Event Title</label>
                    <input type="text" id="event_title" class="form-control" placeholder="e.g., Sharma Wedding">
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-md-4">
                    <label class="form-label">Start Time</label>
                    <input type="time" id="start_time" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">End Time</label>
                    <input type="time" id="end_time" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Location</label>
                    <input type="text" id="location" class="form-control" placeholder="Kathmandu">
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-md-6">
                    <label class="form-label">Contact Person Name</label>
                    <input type="text" id="contact_person" class="form-control" placeholder="Family name">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone Number</label>
                    <input type="text" id="phone_number" class="form-control" placeholder="9841000000">
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-12">
                    <label class="form-label">Notes (Personal Reminder)</label>
                    <textarea id="notes" class="form-control" rows="2" placeholder="e.g., Need 5 assistants, bring specific items..."></textarea>
                </div>
            </div>

            <div class="mt-3">
                <button class="btn btn-danger" onclick="addSchedule()"> Add to Schedule</button>
            </div>
        </div>

        <h4 class="section-title"> Your Busy Dates</h4>
        
        <div id="loading" class="loading-spinner" style="display:none">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2">Loading your schedule...</p>
        </div>

        <div id="schedule-list"></div>

        <div id="no-schedule" class="no-schedule">
            <p>No busy dates scheduled yet</p>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header" style="background: #8B0000; color: white;">
                    <h5 class="modal-title">Edit Schedule Entry</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Busy Date</label>
                            <input type="date" id="edit_busy_date" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Event Type</label>
                            <select id="edit_event_type" class="form-select">
                                <option value="vivah">विवाह (Marriage)</option>
                                <option value="satyanarayan">सत्यनारायण पूजा</option>
                                <option value="griha_pravesh">गृह प्रवेश (House Warming)</option>
                                <option value="janai">जनै</option>
                                <option value="annaprashan">अन्नप्राशन</option>
                                <option value="upanayan">उपनयन</option>
                                <option value="shradh">श्राद्ध</option>
                                <option value="other">अन्य</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Event Title</label>
                            <input type="text" id="edit_event_title" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Start Time</label>
                            <input type="time" id="edit_start_time" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">End Time</label>
                            <input type="time" id="edit_end_time" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Location</label>
                            <input type="text" id="edit_location" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Contact Person Name</label>
                            <input type="text" id="edit_contact_person" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone Number</label>
                            <input type="text" id="edit_phone_number" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Notes</label>
                            <textarea id="edit_notes" class="form-control" rows="4"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" onclick="saveEdit()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header" style="background: #8B0000; color: white;">
                    <h5 class="modal-title">Schedule Details</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="detail-content" class="detail-grid"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-outline-warning" onclick="editCurrentDetail()">Edit</button>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let currentEditingId = null;
        let currentDetailItem = null;
        let scheduleData = [];
        const eventTypeLabels = {
            vivah: 'विवाह (Marriage)',
            satyanarayan: 'सत्यनारायण पूजा',
            griha_pravesh: 'गृह प्रवेश (House Warming)',
            janai: 'जनै',
            annaprashan: 'अन्नप्राशन',
            upanayan: 'उपनयन',
            shradh: 'श्राद्ध',
            other: 'अन्य'
        };

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatDate(value) {
            if (!value) return '—';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return value;
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function formatTime(value) {
            return value ? value.substring(0, 5) : '—';
        }

        function getEventTypeLabel(value) {
            return eventTypeLabels[value] || value || '—';
        }

        function getScheduleDetails(item) {
            return [
                ['Busy Date', formatDate(item.busy_date)],
                ['Event Type', getEventTypeLabel(item.event_type)],
                ['Event Title', item.event_title || '—'],
                ['Start Time', formatTime(item.start_time)],
                ['End Time', formatTime(item.end_time)],
                ['Location', item.location || '—'],
                ['Contact Person', item.contact_person || '—'],
                ['Phone Number', item.phone_number || '—'],
                ['Notes', item.notes || '—']
            ];
        }

        function renderDetailContent(item) {
            document.getElementById('detail-content').innerHTML = getScheduleDetails(item).map(([label, value]) => `
                <div class="detail-item">
                    <div class="detail-label">${escapeHtml(label)}</div>
                    <div class="detail-value">${escapeHtml(value)}</div>
                </div>
            `).join('');
        }

        function checkAccess() {
            if (!isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }

            fetch(`${BASE_URL}/users/profile/`, {
                headers: { "Authorization": `Bearer ${getToken()}` }
            })
            .then(res => res.json())
            .then(data => {
                if (data.user_type !== 'purohit') {
                    alert('This page is only for priests');
                    window.location.href = 'index.html';
                }
            });
        }

        async function loadSchedule() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('schedule-list').innerHTML = '';

            try {
                const res = await fetch(`${BASE_URL}/my-schedule/`, {
                    headers: { "Authorization": `Bearer ${getToken()}` }
                });
                const data = await res.json();

                document.getElementById('loading').style.display = 'none';

                if (!data.results && !Array.isArray(data)) {
                    scheduleData = [];
                    showNoSchedule();
                    return;
                }

                scheduleData = data.results || data;

                if (scheduleData.length === 0) {
                    showNoSchedule();
                } else {
                    renderSchedule();
                }
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                console.error('Error loading schedule:', err);
                showError('Failed to load schedule');
            }
        }

        function renderSchedule() {
            const html = scheduleData.map((item, index) => `
                <div class="schedule-card">
                    <div>
                        <div class="schedule-date">${escapeHtml(formatDate(item.busy_date))}</div>
                        <div class="schedule-event">
                            <strong>${escapeHtml(item.event_title || 'Untitled event')}</strong><br>
                            Type: ${escapeHtml(getEventTypeLabel(item.event_type))}<br>
                            ${item.start_time || item.end_time ? `Time: ${escapeHtml(formatTime(item.start_time))} - ${escapeHtml(formatTime(item.end_time))}` : 'Time: —'}<br>
                            Location: ${escapeHtml(item.location || '—')}<br>
                            Contact: ${escapeHtml(item.contact_person || '—')}<br>
                            Phone: ${escapeHtml(item.phone_number || '—')}
                        </div>
                        <button type="button" class="schedule-notes-link mt-2" data-action="detail" data-index="${index}">
                            ${escapeHtml(item.notes ? `Notes: ${item.notes}` : 'View full schedule details')}
                        </button>
                    </div>
                    <div class="schedule-actions">
                        <button class="btn btn-sm btn-outline-warning btn-edit" data-action="edit" data-index="${index}">Edit</button>
                        <button class="btn btn-sm btn-outline-danger btn-delete" data-action="delete" data-id="${item.id}">Delete</button>
                    </div>
                </div>
            `).join('');

            document.getElementById('schedule-list').innerHTML = html;
            document.getElementById('no-schedule').style.display = 'none';
        }

        document.getElementById('schedule-list').addEventListener('click', (event) => {
            const button = event.target.closest('[data-action]');
            if (!button) return;

            const action = button.dataset.action;
            const index = button.dataset.index;

            if (action === 'detail' && index !== undefined) {
                showScheduleDetail(scheduleData[Number(index)]);
            } else if (action === 'edit' && index !== undefined) {
                editSchedule(scheduleData[Number(index)]);
            } else if (action === 'delete') {
                deleteSchedule(Number(button.dataset.id));
            }
        });

        function showNoSchedule() {
            document.getElementById('schedule-list').innerHTML = '';
            document.getElementById('no-schedule').style.display = 'block';
        }

        async function addSchedule() {
            const busy_date = document.getElementById('busy_date').value;
            const event_type = document.getElementById('event_type').value;
            const event_title = document.getElementById('event_title').value;
            const start_time = document.getElementById('start_time').value;
            const end_time = document.getElementById('end_time').value;
            const location = document.getElementById('location').value;
            const contact_person = document.getElementById('contact_person').value;
            const phone_number = document.getElementById('phone_number').value;
            const notes = document.getElementById('notes').value;

            if (!busy_date || !event_type || !event_title) {
                showError('Please fill in required fields');
                return;
            }
            try {
                const res = await fetch(`${BASE_URL}/my-schedule/`, {
                    method: 'POST',
                    headers: {
                        "Authorization": `Bearer ${getToken()}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        busy_date,
                        event_type,
                        event_title,
                        start_time: start_time || null,
                        end_time: end_time || null,
                        location,
                        contact_person,
                        phone_number,
                        notes
                    })
                });

                if (res.ok) {
                    showSuccess('✓ Event added to schedule!');
                    document.getElementById('busy_date').value = '';
                    document.getElementById('event_title').value = '';
                    document.getElementById('start_time').value = '';
                    document.getElementById('end_time').value = '';
                    document.getElementById('location').value = '';
                    document.getElementById('contact_person').value = '';
                    document.getElementById('phone_number').value = '';
                    document.getElementById('notes').value = '';
                    loadSchedule();
                } else {
                    const data = await res.json();
                    showError(data.error || 'Failed to add event');
                }
            } catch (err) {
                showError('Error: ' + err.message);
            }
        }

        function editSchedule(item) {
            currentEditingId = item.id;
            document.getElementById('edit_busy_date').value = item.busy_date || '';
            document.getElementById('edit_event_type').value = item.event_type || 'other';
            document.getElementById('edit_event_title').value = item.event_title || '';
            document.getElementById('edit_start_time').value = item.start_time ? item.start_time.substring(0, 5) : '';
            document.getElementById('edit_end_time').value = item.end_time ? item.end_time.substring(0, 5) : '';
            document.getElementById('edit_location').value = item.location || '';
            document.getElementById('edit_contact_person').value = item.contact_person || '';
            document.getElementById('edit_phone_number').value = item.phone_number || '';
            document.getElementById('edit_notes').value = item.notes || '';
            new bootstrap.Modal(document.getElementById('editModal')).show();
        }

        function showScheduleDetail(item) {
            currentDetailItem = item;
            renderDetailContent(item);
            new bootstrap.Modal(document.getElementById('detailModal')).show();
        }

        function editCurrentDetail() {
            const modal = bootstrap.Modal.getInstance(document.getElementById('detailModal'));
            if (modal) {
                modal.hide();
            }

            if (currentDetailItem) {
                editSchedule(currentDetailItem);
            }
        }

        async function saveEdit() {
            const busy_date = document.getElementById('edit_busy_date').value;
            const event_type = document.getElementById('edit_event_type').value;
            const event_title = document.getElementById('edit_event_title').value;
            const start_time = document.getElementById('edit_start_time').value;
            const end_time = document.getElementById('edit_end_time').value;
            const location = document.getElementById('edit_location').value;
            const contact_person = document.getElementById('edit_contact_person').value;
            const phone_number = document.getElementById('edit_phone_number').value;
            const notes = document.getElementById('edit_notes').value;

            try {
                const res = await fetch(`${BASE_URL}/my-schedule/${currentEditingId}/`, {
                    method: 'PUT',
                    headers: {
                        "Authorization": `Bearer ${getToken()}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        busy_date,
                        event_type,
                        event_title,
                        start_time: start_time || null,
                        end_time: end_time || null,
                        location,
                        contact_person,
                        phone_number,
                        notes
                    })
                });

                if (res.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                    showSuccess('✓ Event updated!');
                    loadSchedule();
                } else {
                    showError('Failed to update');
                }
            } catch (err) {
                showError('Error: ' + err.message);
            }
        }

        async function deleteSchedule(id) {
            if (!confirm('Delete this event?')) return;

            try {
                const res = await fetch(`${BASE_URL}/my-schedule/${id}/`, {
                    method: 'DELETE',
                    headers: { "Authorization": `Bearer ${getToken()}` }
                });

                if (res.ok) {
                    showSuccess('✓ Event deleted!');
                    loadSchedule();
                }
            } catch (err) {
                showError('Error: ' + err.message);
            }
        }

        function showSuccess(msg) {
            document.getElementById('success-msg').textContent = msg;
            document.getElementById('success-msg').style.display = 'block';
            setTimeout(() => {
                document.getElementById('success-msg').style.display = 'none';
            }, 3000);
        }

        function showError(msg) {
            document.getElementById('error-msg').textContent = '❌ ' + msg;
            document.getElementById('error-msg').style.display = 'block';
            setTimeout(() => {
                document.getElementById('error-msg').style.display = 'none';
            }, 5000);
        }
        checkAccess();
        loadSchedule();
    </script>


</body>
</html>
