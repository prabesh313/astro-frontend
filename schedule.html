<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Schedule — Karmakanda Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .schedule-card {
            background: var(--color-background-primary);
            border-left: 4px solid #8B0000;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .schedule-card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .schedule-date {
            font-size: 20px;
            font-weight: 700;
            color: #8B0000;
        }

        .schedule-event {
            font-size: 14px;
            color: var(--color-text-secondary);
            margin-top: 4px;
        }

        .schedule-actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit, .btn-delete {
            font-size: 12px;
            padding: 6px 12px;
        }

        .form-section {
            background: var(--color-background-secondary);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .form-section h4 {
            color: #8B0000;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--color-border-tertiary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .calendar-day:hover {
            background: #fff8f0;
            border-color: #8B0000;
        }

        .calendar-day.selected {
            background: #8B0000;
            color: white;
        }

        .calendar-day.busy {
            background: #ffcccc;
            border-color: #8B0000;
        }

        .loading-spinner {
            text-align: center;
            padding: 2rem;
        }

        .spinner-border {
            color: #8B0000;
        }

        .no-schedule {
            text-align: center;
            padding: 2rem;
            color: var(--color-text-secondary);
        }

        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
        }

        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html"> Astro</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="priests-list.html">Priests</a></li>
                    <li class="nav-item"><a class="nav-link active" href="schedule.html">My Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="chats.html">Chats</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="section-title"> My Schedule </h2>

        <div id="success-msg" class="success-msg"></div>
        <div id="error-msg" class="error-msg"></div>

        <div class="form-section">
            <h4>Add Busy Date</h4>

            <div class="row">
                <div class="col-md-4">
                    <label class="form-label">Busy Date</label>
                    <input type="date" id="busy_date" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Event Type</label>
                    <select id="event_type" class="form-select">
                        <option value="vivah">विवाह (Marriage)</option>
                        <option value="satyanarayan">सत्यनारायण पूजा</option>
                        <option value="griha_pravesh">गृह प्रवेश (House Warming)</option>
                        <option value="janai">जनै</option>
                        <option value="annaprashan">अन्नप्राशन</option>
                        <option value="upanayan">उपनयन</option>
                        <option value="shradh">श्राद्ध</option>
                        <option value="other">अन्य</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Event Title</label>
                    <input type="text" id="event_title" class="form-control" placeholder="e.g., Sharma Wedding">
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-md-4">
                    <label class="form-label">Start Time</label>
                    <input type="time" id="start_time" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">End Time</label>
                    <input type="time" id="end_time" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Location</label>
                    <input type="text" id="location" class="form-control" placeholder="Kathmandu">
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-md-6">
                    <label class="form-label">Contact Person Name</label>
                    <input type="text" id="contact_person" class="form-control" placeholder="Family name">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone Number</label>
                    <input type="text" id="phone_number" class="form-control" placeholder="9841000000">
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-12">
                    <label class="form-label">Notes (Personal Reminder)</label>
                    <textarea id="notes" class="form-control" rows="2" placeholder="e.g., Need 5 assistants, bring specific items..."></textarea>
                </div>
            </div>

            <div class="mt-3">
                <button class="btn btn-danger" onclick="addSchedule()"> Add to Schedule
                </button>
            </div>
        </div>

        <h4 class="section-title"> Your Busy Dates</h4>
        
        <div id="loading" class="loading-spinner" style="display:none">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2">Loading your schedule...</p>
        </div>

        <div id="schedule-list"></div>

        <div id="no-schedule" class="no-schedule">
            <p>No busy dates scheduled yet</p>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" style="background: #8B0000; color: white;">
                    <h5 class="modal-title">Edit Schedule Entry</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Event Title</label>
                        <input type="text" id="edit_event_title" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Notes</label>
                        <textarea id="edit_notes" class="form-control" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" onclick="saveEdit()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
