<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register — Astro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="hero py-4">
        <h2> Astro</h2>
    </div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h4 class="section-title">Create Account</h4>

                        <div id="error-msg" class="alert alert-danger d-none"></div>
                        <div id="success-msg" class="alert alert-success d-none"></div>

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" id="username" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-control">
                        </div>
                        <button class="btn btn-danger w-100" onclick="handleRegister()">
                            Register
                        </button>
                        <p class="text-center mt-3">
                            Already have account? <a href="login.html">Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function handleRegister() {
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const errorDiv = document.getElementById("error-msg");
            const successDiv = document.getElementById("success-msg");

            const res = await registerUser(username, email, password);//is used to call the registerUser function, which is likely defined in the included api.js or auth.js file. This function is responsible for sending the registration data (username, email, and password) to the server and returning a response indicating whether the registration was successful or if there were any errors
            const data = await res.json();

            if (res.ok) {
                successDiv.textContent = "Account created! Redirecting to login...";
                successDiv.classList.remove("d-none");
                setTimeout(() => window.location.href = "login.html", 1500);
            } else {
                errorDiv.textContent = JSON.stringify(data);
                errorDiv.classList.remove("d-none");
            }
        }
    </script>
</body>
</html>
