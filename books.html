<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Books — Astro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-dark navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">Astro</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="books.html">Books</a></li>
                    <li class="nav-item"><a class="nav-link" href="rituals.html">Rituals</a></li>
                    <li class="nav-item"><a class="nav-link" href="kundali.html" id="nav-kundali" style="display:none">Kundali</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html" id="nav-login">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="nav-logout" style="display:none" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h3 class="section-title">📚 Sacred Books</h3>

        <!-- Search Bar -->
        <div class="input-group mb-4">
            <input type="text" id="search-input" class="form-control"
                   placeholder="Search books by title or category...">
            <button class="btn btn-danger" onclick="searchBooks()">Search</button>
            <button class="btn btn-outline-secondary" onclick="loadBooks('')">Clear</button>
        </div>

        <!-- Loading -->
        <div id="books-loading" class="spinner-wrap">
            <div class="spinner-border text-danger"></div>
        </div>

        <!-- Books Grid -->
        <div id="books-grid" class="row g-4 d-none"></div>

        <!-- No results -->
        <div id="no-results" class="alert alert-info d-none">
            No books found. Try a different search.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function loadBooks(search = "") {
            document.getElementById("books-loading").classList.remove("d-none");
            document.getElementById("books-grid").classList.add("d-none");
            document.getElementById("no-results").classList.add("d-none");

            const data = await getBooks(search);
            const books = data.results || data;

            document.getElementById("books-loading").classList.add("d-none");

            if (!books || books.length === 0) {
                document.getElementById("no-results").classList.remove("d-none");
                return;
            }

            const grid = document.getElementById("books-grid");
            grid.innerHTML = books.map(book => `
                <div class="col-md-4 col-sm-6">
                    <div class="card book-card h-100">
                        <div class="card-body">
                            <h5 class="card-title">${book.title}</h5>
                            <span class="badge bg-danger mb-2">${book.category_name || 'General'}</span>
                            <p class="card-text text-muted small">${book.description || 'No description available.'}</p>
                            <span class="badge bg-secondary">${book.language}</span>
                        </div>
                        <div class="card-footer bg-transparent">
                            ${book.file
                                ? `<a href="${book.file}" target="_blank" class="btn btn-danger btn-sm w-100">
                                     📄 Read PDF
                                   </a>`
                                : `<button class="btn btn-secondary btn-sm w-100" disabled>No file</button>`
                            }
                        </div>
                    </div>
                </div>
            `).join('');

            grid.classList.remove("d-none");
        }

        function searchBooks() {
            const query = document.getElementById("search-input").value.trim();
            loadBooks(query);
        }

        // Search on Enter key
        document.getElementById("search-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") searchBooks();
        });

        // Load all books on page open
        loadBooks();
    </script>
</body>
</html>
