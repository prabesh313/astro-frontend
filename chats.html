<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chats — Karmakanda Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chats-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 0;
            height: calc(100vh - 120px);
            max-height: 650px;
            border: 1px solid var(--color-border-tertiary, #e8d5b7);
            border-radius: 10px;
            overflow: hidden;
        }
        .chats-list {
            border-right: 1px solid var(--color-border-tertiary, #e8d5b7);
            overflow-y: auto;
            background: var(--color-background-primary, #fff);
        }
        .chats-list-header {
            padding: 14px 16px; font-weight: 700; font-size: 14px;
            color: #8B0000; border-bottom: 1px solid var(--color-border-tertiary, #e8d5b7);
            background: #fff8f0;
        }
        .date-separator {
            display: flex; align-items: center; gap: 10px;
            margin: 8px 0; color: #aaa; font-size: 11px;
        }
        .date-separator::before,
        .date-separator::after {
            content: ''; flex: 1;
            height: 1px; background: #e8d5b7;
}

        .chat-item {
            padding: 12px 14px;
            border-bottom: 1px solid var(--color-border-tertiary, #f0e8dc);
            cursor: pointer; transition: background 0.15s;
            display: flex; align-items: center; gap: 10px;
        }
        .chat-item:hover { background: #fdf5ee; }
        .chat-item.active { background: #fff0e0; border-left: 3px solid #8B0000; }
        .chat-item-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #f5e6c8, #e8c98a);
            border: 2px solid #c8a951;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0; overflow: hidden;
        }
        .chat-item-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .chat-item-info { flex: 1; min-width: 0; }
        .chat-item-name {
            font-weight: 600; color: #8B0000; font-size: 13px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .chat-item-preview {
            font-size: 12px; color: var(--color-text-secondary, #8a7060);
            margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .chat-item-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
        .chat-item-time { font-size: 10px; color: var(--color-text-secondary, #aaa); }
        .unread-badge {
            background: #8B0000; color: white; border-radius: 50%;
            width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 700;
        }
        .chat-area {
            display: flex; flex-direction: column;
            background: var(--color-background-primary, #fff);
            min-height: 0; overflow: hidden; flex: 1;
        }
        .chat-header {
            background: linear-gradient(135deg, #8B0000, #c0392b);
            color: white; padding: 12px 16px;
            display: flex; align-items: center; gap: 12px; flex-shrink: 0;
        }
        .chat-header-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; overflow: hidden; flex-shrink: 0;
        }
        .chat-header-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .chat-header-info { flex: 1; }
        .chat-header-info h5 { margin: 0; font-size: 15px; font-weight: 700; }
        .chat-header-info small { font-size: 11px; opacity: 0.8; }
        .chat-header-actions { display: flex; gap: 6px; align-items: center; }
        .call-btn {
            background: rgba(255,255,255,0.2); border: none; color: white;
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 15px; transition: background 0.2s; flex-shrink: 0;
        }
        .call-btn:hover { background: rgba(255,255,255,0.35); }
        .ws-status {
            width: 8px; height: 8px; border-radius: 50%;
            background: #aaa; flex-shrink: 0; transition: background 0.3s;
        }
        .ws-status.connected { background: #2ecc71; }
        .ws-status.connecting { background: #f39c12; }
        .ws-status.disconnected { background: #e74c3c; }
        .messages-area {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 10px;
            background: #fdf8f2; min-height: 0;
        }
        .message { display: flex; gap: 8px; align-items: flex-end; }
        .message.own { justify-content: flex-end; }
        .message.system { justify-content: center; }
        .message-bubble {
            max-width: 60%; padding: 9px 13px; border-radius: 12px;
            font-size: 13px; line-height: 1.5; word-break: break-word;
        }
        .message.other .message-bubble {
            background: #fff; color: #2c1a0e;
            border: 1px solid #e8d5b7; border-bottom-left-radius: 3px;
        }
        .message.own .message-bubble {
            background: #8B0000; color: white; border-bottom-right-radius: 3px;
        }
        .message.system .message-bubble {
            background: #f0e8e8; color: #8B0000;
            border: 1px solid #e8d5b7; font-size: 12px;
            text-align: center; max-width: 80%;
        }
        .message-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
        .message.other .message-meta { align-items: flex-start; }
        .message-time { font-size: 10px; color: #aaa; }
        .message-read { font-size: 10px; color: #8B0000; }
        .chat-input-area {
            padding: 10px 12px;
            border-top: 1px solid var(--color-border-tertiary, #e8d5b7);
            display: flex; align-items: center; gap: 8px;
            background: #fff; flex-shrink: 0;
        }
        .input-icon-btn {
            background: none; border: none; cursor: pointer;
            font-size: 18px; padding: 4px; border-radius: 50%;
            color: #8B0000; transition: background 0.2s;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .input-icon-btn:hover { background: #fff0e0; }
        .chat-input-area input {
            flex: 1; padding: 10px 14px;
            border: 1px solid var(--color-border-tertiary, #e8d5b7);
            border-radius: 20px; font-size: 13px; outline: none;
        }
        .chat-input-area input:focus { border-color: #8B0000; }
        .send-btn {
            background: #8B0000; color: white; border: none;
            padding: 10px 20px; border-radius: 20px;
            font-weight: 600; cursor: pointer; transition: background 0.2s; flex-shrink: 0;
        }
        .send-btn:hover { background: #c0392b; }
        .no-chat-selected {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; color: var(--color-text-secondary, #8a7060); gap: 8px;
        }
        .no-chat-selected span { font-size: 40px; }
        .no-chats { padding: 20px; text-align: center; color: var(--color-text-secondary, #8a7060); font-size: 13px; }
        .loading-chats { padding: 20px; text-align: center; }

        .call-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.78); z-index: 9999;
            align-items: center; justify-content: center;
        }
        .call-overlay.show { display: flex; }
        .call-box {
            background: #1a0808; border-radius: 20px;
            padding: 36px 44px; text-align: center; color: white;
            min-width: 290px; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .caller-avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, #8B0000, #c0392b);
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; margin: 0 auto 16px; animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(139,0,0,0.5); }
            50%      { box-shadow: 0 0 0 18px rgba(139,0,0,0); }
        }
        .call-box h4 { font-size: 20px; margin-bottom: 4px; }
        .call-box p  { font-size: 13px; opacity: 0.65; margin-bottom: 28px; }
        .call-actions { display: flex; gap: 20px; justify-content: center; }
        .btn-reject {
            background: #e74c3c; border: none; color: white;
            width: 58px; height: 58px; border-radius: 50%; font-size: 22px;
            cursor: pointer; transition: transform 0.15s;
        }
        .btn-reject:hover { transform: scale(1.1); }
        .btn-accept {
            background: #2ecc71; border: none; color: white;
            width: 58px; height: 58px; border-radius: 50%; font-size: 22px;
            cursor: pointer; transition: transform 0.15s;
        }
        .btn-accept:hover { transform: scale(1.1); }

        /* ── Active call window ── */
        .call-window {
            display: none; position: fixed; inset: 0;
            background: #080808; z-index: 9998;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .call-window.show { display: flex; }
        .call-window-name {
            color: white; font-size: 18px; font-weight: 700;
            position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
            white-space: nowrap;
        }
        .call-timer {
            color: rgba(255,255,255,0.55); font-size: 13px;
            position: absolute; top: 52px; left: 50%; transform: translateX(-50%);
        }
        #remote-video {
            width: 100%; max-width: 820px; max-height: 62vh;
            object-fit: cover; border-radius: 12px; background: #1a1a1a;
        }
        #local-video {
            position: absolute; bottom: 110px; right: 20px;
            width: 160px; height: 100px; object-fit: cover;
            border: 2px solid #8B0000; border-radius: 8px; background: #111;
        }
        .audio-call-ui { text-align: center; color: white; }
        .audio-big-avatar {
            width: 110px; height: 110px; border-radius: 50%;
            background: linear-gradient(135deg, #8B0000, #c0392b);
            display: flex; align-items: center; justify-content: center;
            font-size: 52px; margin: 0 auto 16px; animation: pulse 1.5s infinite;
        }
        .audio-call-ui h3 { color: white; margin-bottom: 8px; }
        .audio-call-ui p  { color: rgba(255,255,255,0.55); font-size: 13px; }
        .call-controls {
            position: absolute; bottom: 32px;
            display: flex; gap: 16px; align-items: center;
        }
        .ctrl-btn {
            width: 52px; height: 52px; border-radius: 50%; border: none;
            font-size: 20px; cursor: pointer; transition: transform 0.15s, background 0.2s;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.15); color: white;
        }
        .ctrl-btn:hover { transform: scale(1.1); }
        .ctrl-btn.active { background: #e74c3c; }
        .ctrl-btn.end { background: #e74c3c; width: 62px; height: 62px; font-size: 24px; }

        @media (max-width: 768px) {
            .chats-container { grid-template-columns: 1fr; max-height: none; height: auto; }
            .chats-list { border-right: none; border-bottom: 1px solid var(--color-border-tertiary); max-height: 220px; }
            .message-bubble { max-width: 80%; }
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>

    let chatsData       = [];
    let selectedChatId  = null;
    let chatSocket      = null;
    let chatReconnect   = null;
    let callSocket      = null;
    let callReconnect   = null;

    // global call sockets — one per chat, for receiving calls from any chat
    let globalCallSockets = {};
    let incomingChatId    = null;

    // WebRTC
    let peerConnection    = null;
    let localStream       = null;
    let callType          = null;
    let isCaller          = false;
    let incomingOffer     = null;
    let callTimerInterval = null;
    let callSeconds       = 0;
    let isMuted           = false;
    let isVideoOff        = false;

    const ICE_SERVERS = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
        ]
    };

    if (!isLoggedIn()) window.location.href = 'login.html';

    // request notification permission on page load
    async function requestNotificationPermission() {
        if ('Notification' in window && Notification.permission === 'default') {
            await Notification.requestPermission();
        }
    }

    // show browser notification for incoming calls
    function showBrowserNotification(title, body, onClick) {
        if (!('Notification' in window) || Notification.permission !== 'granted') return;
        const n = new Notification(title, {
            body,
            icon: 'img/logo.png',
            requireInteraction: true,
            tag: 'incoming-call',
        });
        n.onclick = () => { window.focus(); onClick(); n.close(); };
        setTimeout(() => n.close(), 30000);
        return n;
    }

    function formatChatListTime(date) {
        const now   = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const msgDay = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const diffDays = Math.round((today - msgDay) / 86400000);

        if (diffDays === 0) return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        if (diffDays < 7)  return date.toLocaleDateString([], { weekday: 'short' });
        return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
    }
    
    function formatDateSeparator(date) {
        const now    = new Date();
        const today  = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const msgDay = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const diffDays = Math.round((today - msgDay) / 86400000);

        if (diffDays === 0) return 'Today';
        if (diffDays === 1) return 'Yesterday';
        return date.toLocaleDateString([], { month: 'long', day: 'numeric', year: 'numeric' });
    }

    function isSameDay(a, b) {
        return a.getFullYear() === b.getFullYear()
            && a.getMonth()    === b.getMonth()
            && a.getDate()     === b.getDate();
    }



    function renderChatList() {
        if (!Array.isArray(chatsData) || chatsData.length === 0) {
            document.getElementById('no-chats').style.display = 'block';
            document.getElementById('chats-list').innerHTML = '';
            return;
        }
        document.getElementById('no-chats').style.display = 'none';
        const sorted = [...chatsData].sort((a, b) => {
        const aTime = a.last_message ? new Date(a.last_message.created_at) : new Date(a.updated_at);
        const bTime = b.last_message ? new Date(b.last_message.created_at) : new Date(b.updated_at);
        return bTime - aTime;
    });


        document.getElementById('chats-list').innerHTML = sorted.map(chat => {
            const name    = chat.other_username || 'Unknown';
            const profile = chat.other_user_profile || {};
            const avatar  = profile.profile_image ? `<img src="${profile.profile_image}" alt="${name}">` : `🧑`;
            const preview = chat.last_message ? chat.last_message.message_text.substring(0, 35) + '...' : 'No messages yet';
            const time = chat.last_message ? formatChatListTime(new Date(chat.last_message.created_at)) : '';

            return `
            <div class="chat-item" id="chat-item-${chat.id}" onclick="selectChat(${chat.id}, this)">
                <div class="chat-item-avatar">${avatar}</div>
                <div class="chat-item-info">
                    <div class="chat-item-name">${name}</div>
                    <div class="chat-item-preview">${preview}</div>
                </div>
                <div class="chat-item-meta">
                    <div class="chat-item-time">${time}</div>
                    ${chat.unread_count > 0 ? `<div class="unread-badge">${chat.unread_count}</div>` : ''}
                </div>
            </div>`;
        }).join('');
    }

    async function loadChats() {
        try {
            const res  = await fetch(`${BASE_URL}/chats/`, { headers: { "Authorization": `Bearer ${getToken()}` } });
            const data = await res.json();
            document.getElementById('chats-loading').style.display = 'none';
            chatsData = data.results || data;
            renderChatList();

            // connect global call listeners for ALL chats
            connectGlobalCallSockets();

            // handle URL redirects
            const params = new URLSearchParams(window.location.search);

            // redirected here because of an incoming call from another tab
            const incomingCallParam = params.get('incoming_call');
            const incomingChatParam = params.get('chat_id');
            const incomingTypeParam = params.get('call_type');

            if (incomingCallParam && incomingChatParam) {
                history.replaceState({}, '', 'chats.html');

                const chatId = parseInt(incomingChatParam);
                await selectChat(chatId, null);
                // show incoming call overlay
                const stored = localStorage.getItem('incoming_call');
                if (stored) {
                    const info = JSON.parse(stored);
                    callType      = info.callType || incomingTypeParam || 'video';
                    incomingChatId = chatId;
                    document.getElementById('caller-name').textContent     = info.callerName || 'Someone';
                    document.getElementById('call-type-label').textContent = callType === 'video' ? 'Incoming video call...' : 'Incoming audio call...';
                    const avatarEl = document.getElementById('caller-avatar');
                    avatarEl.innerHTML = info.profileImage ? `<img src="${info.profileImage}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : '🧑';
                    document.getElementById('incoming-call-overlay').classList.add('show');

                    // wait for callSocket to connect, then handle offer
                    setTimeout(waitForOfferFromStorage, 1500);
                }
                return;
            }

            // normal redirect from priests-list
            const userId = params.get('user_id') || params.get('priest_id');
            if (userId) {
                history.replaceState({}, '', 'chats.html');
                await startNewChat(userId);
            }

        } catch (err) {
            console.error('Error loading chats:', err);
            document.getElementById('chats-loading').style.display = 'none';
        }
    }

    // connect WebSocket for each chat to listen for incoming calls, even when not actively viewing that chat
    function connectGlobalCallSockets() {
        if (!Array.isArray(chatsData)) return;
        chatsData.forEach(chat => {
            if (globalCallSockets[chat.id]) return; // already connected
            openGlobalCallSocket(chat.id);
        });
    }

    function openGlobalCallSocket(chatId) {
        const ws = new WebSocket(`ws://127.0.0.1:8000/ws/calls/${chatId}/?token=${getToken()}`);

        ws.onmessage = async (event) => {
            const data = JSON.parse(event.data);
            if (data.sender_username === getUsername()) return;

            // if this is the active chat, the dedicated callSocket handles it
            if (selectedChatId === chatId && callSocket && callSocket.readyState === WebSocket.OPEN) return;

            switch (data.type) {
                case 'call_request': {
                    callType       = data.call_type || 'video';
                    isCaller       = false;
                    incomingChatId = chatId;

                    const chat  = chatsData.find(c => c.id === chatId);
                    const name  = chat ? (chat.other_user_profile?.full_name || chat.other_username) : data.sender_username;
                    const imgUrl = chat?.other_user_profile?.profile_image;

                    const avatarEl = document.getElementById('caller-avatar');  // ← add
                    avatarEl.innerHTML = imgUrl ? `<img src="${imgUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : '🧑';
                    // store in localStorage so other pages can see it
                    localStorage.setItem('incoming_call', JSON.stringify({
                        chatId, callType, callerName: name, profileImage: imgUrl || null , timestamp: Date.now()
                    }));

                    document.getElementById('caller-name').textContent     = name;
                    document.getElementById('call-type-label').textContent = callType === 'video' ? 'Incoming video call...' : 'Incoming audio call...';
                    document.getElementById('incoming-call-overlay').classList.add('show');

                    // browser notification ,in case tab is not focused
                    showBrowserNotification(
                        `📞 Incoming ${callType === 'video' ? 'Video' : 'Audio'} Call`,
                        `${name} is calling you`,
                        () => {} // user already on chats.html
                    );
                    break;
                }
                case 'call_offer':
                    incomingOffer = data;
                    localStorage.setItem('incoming_offer', JSON.stringify(data));
                    break;
                case 'call_end':
                    if (incomingChatId === chatId) {
                        document.getElementById('incoming-call-overlay').classList.remove('show');
                        cleanupCall();
                        localStorage.removeItem('incoming_call');
                    }
                    break;
            }
        };

        ws.onclose = () => {
            delete globalCallSockets[chatId];
            setTimeout(() => openGlobalCallSocket(chatId), 5000);
        };
        
        globalCallSockets[chatId] = ws;
    }

    function waitForOfferFromStorage() {
        if (incomingOffer) return; // already received
        // offer might arrive shortly after page load ,keep checking for 10s
        let attempts = 0;
        const interval = setInterval(() => {
            attempts++;
            if (incomingOffer || attempts > 20) clearInterval(interval);
        }, 500);
    }


    async function selectChat(chatId, el) {
        selectedChatId = chatId;
        const chat = chatsData.find(c => c.id === chatId);
        if (!chat) return;

        document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
        (el || document.getElementById(`chat-item-${chatId}`))?.classList.add('active');

        document.getElementById('no-chat-selected').style.display = 'none';
        document.getElementById('chat-content').style.display = 'flex';

        const name    = chat.other_username || 'Unknown';
        const profile = chat.other_user_profile || {};
        const avatar  = profile.profile_image ? `<img src="${profile.profile_image}" alt="${name}">` : `🧑`;

        document.getElementById('chat-header').innerHTML = `
            <div class="chat-header-avatar"onclick="window.location.href='profile.html?user_id=${chat.other_user_id}'" style="cursor:pointer" title="View profile">${avatar}</div>
            <div class="chat-header-info" onclick="window.location.href='profile.html?user_id=${chat.other_user_id}'" style="cursor:pointer" title="View profile">
                <h5>${profile.full_name || name}</h5>
                ${profile.user_type ? `<small>${profile.user_type}</small>` : ''}
            </div>
            <div class="chat-header-actions">
                <button class="call-btn" onclick="startCall('audio')" title="Audio Call">📞</button>
                <button class="call-btn" onclick="startCall('video')" title="Video Call">📹</button>
            </div>
            <div class="ws-status connecting" id="ws-status" title="Connecting..."></div>`;

        await loadMessages(chatId);
        await markMessagesRead(chatId);
        const badge = document.querySelector(`#chat-item-${chatId} .unread-badge`);
        if (badge) badge.remove();

        connectChatSocket(chatId);
        connectCallSocket(chatId);
    }

    function selectChatById(chatId) {
        const el = document.getElementById(`chat-item-${chatId}`);
        if (el) selectChat(chatId, el);
        else selectChat(chatId, null);
    }
    
    
    function connectChatSocket(chatId) {
        if (chatSocket) { chatSocket.onclose = null; chatSocket.close(); chatSocket = null; }
        if (chatReconnect) { clearTimeout(chatReconnect); chatReconnect = null; }
        setWsStatus('connecting');
        chatSocket = new WebSocket(`ws://127.0.0.1:8000/ws/chats/${chatId}/?token=${getToken()}`);
        chatSocket.onopen  = () => setWsStatus('connected');
        chatSocket.onclose = () => {
            setWsStatus('disconnected');
            if (selectedChatId === chatId)
                chatReconnect = setTimeout(() => connectChatSocket(chatId), 3000);
        };
        chatSocket.onerror = () => setWsStatus('disconnected');
        chatSocket.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'chat_message') {
                if (msg.sender_username !== getUsername()) appendMessage(msg);
                refreshChatListItem(chatId, msg);
            }
        };
    }


    function connectCallSocket(chatId) {
        if (callSocket) { callSocket.onclose = null; callSocket.close(); callSocket = null; }
        if (callReconnect) { clearTimeout(callReconnect); callReconnect = null; }
        callSocket = new WebSocket(`ws://127.0.0.1:8000/ws/calls/${chatId}/?token=${getToken()}`);
        callSocket.onclose = () => {
            if (selectedChatId === chatId)
                callReconnect = setTimeout(() => connectCallSocket(chatId), 3000);
        };
        callSocket.onmessage = async (event) => {
            const data = JSON.parse(event.data);
            if (data.sender_username === getUsername()) return;
            switch (data.type) {
                case 'call_request':   showIncomingCallUI(data, chatId); break;
                case 'call_offer':     incomingOffer = data;             break;
                case 'call_answer':    handleAnswer(data);               break;
                case 'ice_candidate':  handleIceCandidate(data);         break;
                case 'call_end':       handleRemoteCallEnd();            break;
                case 'call_reject':    handleCallRejected();             break;
            }
        };
    }

    function sendCallSignal(payload) {
        // prefer dedicated callSocket, fallback to globalCallSocket
        const sock = (callSocket && callSocket.readyState === WebSocket.OPEN)
            ? callSocket
            : globalCallSockets[incomingChatId || selectedChatId];
        if (sock && sock.readyState === WebSocket.OPEN)
        //sends payload in JSON string form to server via WebSocket, which then forwards it to the other user
            sock.send(JSON.stringify(payload));
    }

    function setWsStatus(status) {
        const dot = document.getElementById('ws-status');
        if (!dot) return;
        dot.className = `ws-status ${status}`;
        dot.title = { connected:'Connected', connecting:'Connecting...', disconnected:'Disconnected' }[status];
    }


    async function loadMessages(chatId) {
        try {
            const res      = await fetch(`${BASE_URL}/chats/${chatId}/messages/`, { headers: { "Authorization": `Bearer ${getToken()}` } });
            const data     = await res.json();
            const messages = data.results || data;
            const area     = document.getElementById('messages-area');

            if (!messages.length) {
                area.innerHTML = '<div style="text-align:center;color:#aaa;font-size:13px;padding:20px;">No messages yet. Say hello! 👋</div>';
                return;
            }

            let html = '';
            let lastDate = null;

            messages.forEach(msg => {
                const msgDate = new Date(msg.created_at);
                if (!lastDate || !isSameDay(lastDate, msgDate)) {
                    html += `<div class="date-separator">${formatDateSeparator(msgDate)}</div>`;
                    lastDate = msgDate;
                }
                html += buildMessageHtml(msg);
            });

            area.innerHTML = html;
            area.scrollTop = area.scrollHeight;
        } catch (err) { console.error('Error loading messages:', err); }
    }
    function buildMessageHtml(msg) {
        const isOwn = msg.sender_username === getUsername();
        const isSystem= msg.is_system ;
        const time  = new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        
        if (isSystem) {
        return `
            <div class="message system" data-date="${msg.created_at}">
                <div class="message-bubble">${msg.message_text}</div>
            </div>`;
    }

        return `
            <div class="message ${isOwn ? 'own' : 'other'}" data-date="${msg.created_at}">
                <div class="message-bubble">${msg.message_text}</div>
                <div class="message-meta">
                    <div class="message-time">${time}</div>
                    ${isOwn ? `<span class="message-read">${msg.is_read ? '✓✓' : '✓'}</span>` : ''}
                </div>
            </div>`;
    }

    function appendMessage(msg) {
        const area = document.getElementById('messages-area');
        if (!area) return;
        const ph = area.querySelector('div[style*="text-align:center"]');
        if (ph) ph.remove();

        const msgDate  = new Date(msg.created_at);
        const lastMsg  = area.lastElementChild;
        const lastTime = lastMsg?.dataset?.date ? new Date(lastMsg.dataset.date) : null;
        if (!lastTime || !isSameDay(lastTime, msgDate)) {
            const sep = document.createElement('div');
            sep.className   = 'date-separator';
            sep.textContent = formatDateSeparator(msgDate);
            area.appendChild(sep);
        }
        const div = document.createElement('div');
        div.innerHTML = buildMessageHtml(msg);
        const el = div.firstElementChild;
        el.dataset.date = msg.created_at;
        area.appendChild(el);
        area.scrollTop = area.scrollHeight;
    }

    //shows system messages in the chat (eg. call ended, call started...)
    function appendSystemMessage(text) {
        const area = document.getElementById('messages-area');
        if (!area) return;
        const div = document.createElement('div');
        div.className = 'message system';
        div.innerHTML = `<div class="message-bubble">${text}</div>`;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }
    // when a new message is sent or received, update the chat list and timestamp
    function refreshChatListItem(chatId, msg) {
        const chat = chatsData.find(c => c.id === chatId);
        if (chat) {
            chat.last_message = { message_text: msg.message_text, created_at: msg.created_at };
            renderChatList();
            const el = document.getElementById(`chat-item-${chatId}`);
            if (el) el.classList.add('active');
        }
    }

    async function sendMessage() {
        const input = document.getElementById('message-input');
        const text  = input.value.trim();
        if (!text || !selectedChatId) return;
        input.value = '';
        if (chatSocket && chatSocket.readyState === WebSocket.OPEN) {
            chatSocket.send(JSON.stringify({ type: 'chat_message', message_text: text }));
            appendMessage({ sender_username: getUsername(), message_text: text, created_at: new Date().toISOString(), is_read: false });
        } else {
            // fallback to HTTP POST if WebSocket is not connected
            const res = await fetch(`${BASE_URL}/chats/${selectedChatId}/messages/`, {
                method: 'POST',
                headers: { "Authorization": `Bearer ${getToken()}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message_text: text })
            });
            if (res.ok) await loadMessages(selectedChatId);
        }
    }

    async function markMessagesRead(chatId) {
        try {
            await fetch(`${BASE_URL}/chats/${chatId}/mark-read/`, {
                method: 'PUT', headers: { "Authorization": `Bearer ${getToken()}` }
            });
        } catch (err) {}
    }

    async function startNewChat(userId) {
        try {
            const res = await fetch(`${BASE_URL}/chats/start/`, {
                method: 'POST',
                headers: { "Authorization": `Bearer ${getToken()}`, "Content-Type": "application/json" },
                body: JSON.stringify({ user_id: userId })
            });
            if (res.ok) {
                const chat = await res.json();

                // refresh chat list and select the new chat
                const res2 = await fetch(`${BASE_URL}/chats/`, { headers: { "Authorization": `Bearer ${getToken()}` } });
                const data = await res2.json();
                chatsData = data.results || data;
                renderChatList();
                connectGlobalCallSockets();
                selectChatById(chat.id);
            }
        } catch (err) { console.error('Error starting chat:', err); }
    }

    async function startCall(type) {
        if (!callSocket || callSocket.readyState !== WebSocket.OPEN) {
            alert('Not connected. Please wait a moment and try again.');
            return;
        }
        callType = type; isCaller = true;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: type === 'video' });
        } catch (err) {
            alert('Could not access camera/microphone. Please check permissions.');
            return;
        }
        sendCallSignal({ type: 'call_request', call_type: callType });
        showCallWindow(type, 'Calling...');
        await createPeerConnection();
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);// send the offer to the other user via WebSocket, which then forwards it to the other user's browser
        sendCallSignal({ type: 'call_offer', sdp: offer, call_type: callType });

        // re-send offer after 3s in case callee just loaded the page
        setTimeout(() => {
            if (peerConnection && peerConnection.signalingState !== 'stable') {
                sendCallSignal({ type: 'call_offer', sdp: offer, call_type: callType });
            }
        }, 3000);

        // re-send again after 6s
        setTimeout(() => {
            if (peerConnection && peerConnection.signalingState !== 'stable') {
                sendCallSignal({ type: 'call_offer', sdp: offer, call_type: callType });
            }
        }, 6000);
    }

    function showIncomingCallUI(data, chatId) {
        callType       = data.call_type || 'video';
        isCaller       = false;
        incomingChatId = chatId;

        const chat  = chatsData.find(c => c.id === chatId);
        const name  = chat ? (chat.other_user_profile?.full_name || chat.other_username) : data.sender_username;
        const imgUrl  = chat?.other_user_profile?.profile_image;

        const avatarEl = document.getElementById('caller-avatar');
        avatarEl.innerHTML = imgUrl ? `<img src="${imgUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`: '🧑';

        localStorage.setItem('incoming_call', JSON.stringify({ chatId, callType, callerName: name, profileImage: imgUrl || null , timestamp: Date.now() }));

        document.getElementById('caller-name').textContent     = name;
        document.getElementById('call-type-label').textContent = callType === 'video' ? 'Incoming video call...' : 'Incoming audio call...';
        document.getElementById('incoming-call-overlay').classList.add('show');

        showBrowserNotification(
            `📞 Incoming ${callType === 'video' ? 'Video' : 'Audio'} Call`,
            `${name} is calling you`,
            () => {}
        );
    }

    async function acceptCall() {
        document.getElementById('incoming-call-overlay').classList.remove('show');
        localStorage.removeItem('incoming_call');

        // if call came from a different chat, switch to it
        if (incomingChatId && incomingChatId !== selectedChatId) {
            await selectChat(incomingChatId, null);
            await new Promise(r => setTimeout(r, 1000)); // wait for sockets
        }

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: callType === 'video' });
        } catch (err) { alert('Could not access camera/microphone.'); return; }

        showCallWindow(callType);
        await createPeerConnection();

        if(!incomingOffer) {
            const stored = localStorage.getItem('incoming_offer');
            if (stored) {
                incomingOffer = JSON.parse(stored);
            }
        }

        if(!incomingOffer){
        // wait for offer if not received yet
        let waited = 0;
        while (!incomingOffer && waited < 8000) {
            await new Promise(r => setTimeout(r, 300));// is offer received via WebSocket? if not, keep waiting (offer should arrive within a few seconds after accept)
            waited += 300;
            const stored = localStorage.getItem('incoming_offer');
            if (stored) { incomingOffer = JSON.parse(stored); break; }
        }
        }
        if (!incomingOffer) { alert('Call connection failed. Please try again.'); cleanupCall(); return; }
        
        localStorage.removeItem('incoming_offer');  // clean up

        await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingOffer.sdp));// create an answer to the received offer, set it as local description, and send it back to the caller via WebSocket, which then forwards it to the caller's browser
        const answer = await peerConnection.createAnswer();// set the generated answer as the local description of the peer connection
        await peerConnection.setLocalDescription(answer); // send the answer to the other user via WebSocket, which then forwards it to the other user's browser
        sendCallSignal({ type: 'call_answer', sdp: answer });// reset incoming offer and chat ID since call is now established
        incomingOffer  = null;
        incomingChatId = null;
    }

    function rejectCall() {
        document.getElementById('incoming-call-overlay').classList.remove('show');
        localStorage.removeItem('incoming_call');
        sendCallSignal({ type: 'call_reject', call_type: callType });
        incomingOffer  = null;
        incomingChatId = null;
    }



    async function createPeerConnection() {
        peerConnection = new RTCPeerConnection(ICE_SERVERS);
        localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
        if (callType === 'video') document.getElementById('local-video').srcObject = localStream;

        peerConnection.onicecandidate = (e) => {
            if (e.candidate) sendCallSignal({ type: 'ice_candidate', candidate: e.candidate });
        };
        peerConnection.ontrack = (e) => {
            if (callType === 'video') {
                document.getElementById('remote-video').srcObject = e.streams[0];
            } else {
                let audio = document.getElementById('remote-audio');
                if (!audio) { audio = document.createElement('audio'); audio.id = 'remote-audio'; audio.autoplay = true; document.body.appendChild(audio); }
                audio.srcObject = e.streams[0];
                document.getElementById('audio-status').textContent = 'Connected';
            }
        };
        peerConnection.onconnectionstatechange = () => {
            if (peerConnection.connectionState === 'connected') {
                startCallTimer();
                if (callType === 'audio') document.getElementById('audio-status').textContent = 'Connected';
            }
        };
    }

    async function handleAnswer(data) {
        if (peerConnection) await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
    }
    async function handleIceCandidate(data) {
        if (peerConnection && data.candidate) {
            try { await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); }
            catch (err) { console.error('ICE error:', err); }
        }
    }


    function showCallWindow(type, status) {
        document.getElementById('call-window').classList.add('show');
        const chat = chatsData.find(c => c.id === (incomingChatId || selectedChatId));
        const name  = chat ? (chat.other_user_profile?.full_name || chat.other_username) : 'Unknown';
        const imgUrl = chat?.other_user_profile?.profile_image;

        document.getElementById('call-window-name').textContent = name;
        if (type === 'video') {
            document.getElementById('video-call-ui').style.display = 'flex';
            document.getElementById('audio-call-ui').style.display = 'none';
            document.getElementById('video-btn').style.display     = 'flex';
        } else {
            document.getElementById('video-call-ui').style.display = 'none';
            document.getElementById('audio-call-ui').style.display = 'block';
            document.getElementById('video-btn').style.display     = 'none';
            document.getElementById('audio-peer-name').textContent = name;
            document.getElementById('audio-status').textContent    = status || 'Ringing...';

            const bigAvatar = document.getElementById('audio-big-avatar');
            bigAvatar.innerHTML = imgUrl ? `<img src="${imgUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : '🧑';
        }

    }

    function endCall() { sendCallSignal({ type: 'call_end', call_type: callType, duration: callSeconds }); cleanupCall();  }
    function handleRemoteCallEnd() { cleanupCall();  }
    function handleCallRejected()  { cleanupCall();  }

    function cleanupCall() {
        if (callTimerInterval) { clearInterval(callTimerInterval); callTimerInterval = null; }
        callSeconds = 0;
        document.getElementById('call-timer').textContent = '00:00';
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
        if (localStream)    { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        document.getElementById('remote-video').srcObject = null;
        document.getElementById('local-video').srcObject  = null;
        const ra = document.getElementById('remote-audio');
        if (ra) ra.srcObject = null;
        document.getElementById('call-window').classList.remove('show');
        document.getElementById('incoming-call-overlay').classList.remove('show');
        localStorage.removeItem('incoming_call');
        localStorage.removeItem('incoming_offer');
        isMuted = false; isVideoOff = false; isCaller = false; incomingChatId = null;
        document.getElementById('mute-btn').classList.remove('active');
        document.getElementById('video-btn').classList.remove('active');
        document.getElementById('mute-btn').textContent  = '🎤';
        document.getElementById('video-btn').textContent = '📹';
    }

    function toggleMute() {
        if (!localStream) return;
        isMuted = !isMuted;
        localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
        const btn = document.getElementById('mute-btn');
        btn.classList.toggle('active', isMuted);
        btn.textContent = isMuted ? '🔇' : '🎤';
    }
    function toggleVideo() {
        if (!localStream) return;
        isVideoOff = !isVideoOff;
        localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
        const btn = document.getElementById('video-btn');
        btn.classList.toggle('active', isVideoOff);
        btn.textContent = isVideoOff ? '🚫' : '📹';
    }
    function startCallTimer() {
        callSeconds = 0;
        callTimerInterval = setInterval(() => {
            callSeconds++;
            const m = String(Math.floor(callSeconds / 60)).padStart(2, '0');
            const s = String(callSeconds % 60).padStart(2, '0');
            document.getElementById('call-timer').textContent = `${m}:${s}`;
        }, 1000);
    }


    function getUsername() { return localStorage.getItem('username') || ''; }

    // listen for incoming_call set by global-ws.js on other pages
    window.addEventListener('storage', (e) => {
        if (e.key === 'incoming_call' && e.newValue) {
            const info = JSON.parse(e.newValue);
            // another tab set this — show the overlay on this tab too
            callType       = info.callType;
            incomingChatId = info.chatId;
            document.getElementById('caller-name').textContent     = info.callerName;
            document.getElementById('call-type-label').textContent = callType === 'video' ? 'Incoming video call...' : 'Incoming audio call...';
            const avatarEl = document.getElementById('caller-avatar');
            avatarEl.innerHTML = info.profileImage ? `<img src="${info.profileImage}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : '🧑';

            document.getElementById('incoming-call-overlay').classList.add('show');
        }
        if (e.key === 'incoming_call' && !e.newValue) {
            // call was answered/rejected on another tab
            document.getElementById('incoming-call-overlay').classList.remove('show');
        }
    });

    // 10s chat list poll
    setInterval(async () => {
        try {
            const res  = await fetch(`${BASE_URL}/chats/`, { headers: { "Authorization": `Bearer ${getToken()}` } });
            const data = await res.json();
            chatsData = data.results || data;
            renderChatList();
            if (selectedChatId) {
                const el = document.getElementById(`chat-item-${selectedChatId}`);
                if (el) el.classList.add('active');
            }
        } catch (err) {}
    }, 10000);

    document.addEventListener('DOMContentLoaded', async () => {
        await requestNotificationPermission();
        document.getElementById('message-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });
    });

    window.addEventListener('beforeunload', () => {
        if (chatSocket) chatSocket.close();
        if (callSocket) callSocket.close();
        if (peerConnection) peerConnection.close();
        Object.values(globalCallSockets).forEach(ws => ws.close());
    });

    loadChats();
    </script>
