<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chats — Karmakanda Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chats-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 0;
            height: calc(100vh - 120px);
            max-height: 600px;
        }

        .chats-list {
            border-right: 1px solid var(--color-border-tertiary);
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px;
            border-bottom: 0.5px solid var(--color-border-tertiary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-item:hover {
            background: var(--color-background-secondary);
        }

        .chat-item.active {
            background: #fff8f0;
            border-left: 3px solid #8B0000;
        }

        .chat-item-info {
            flex: 1;
        }

        .chat-item-name {
            font-weight: 600;
            color: #8B0000;
            font-size: 13px;
        }

        .chat-item-preview {
            font-size: 12px;
            color: var(--color-text-secondary);
            margin-top: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .unread-badge {
            background: #8B0000;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        .chat-area {
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: linear-gradient(135deg, #8B0000, #c0392b);
            color: white;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h5 {
            margin: 0;
            font-weight: 700;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .message.own {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 60%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        .message.other .message-bubble {
            background: var(--color-background-secondary);
            color: var(--color-text-primary);
        }

        .message.own .message-bubble {
            background: #8B0000;
            color: white;
        }

        .message-time {
            font-size: 11px;
            color: var(--color-text-tertiary);
        }

        .chat-input-area {
            padding: 12px;
            border-top: 1px solid var(--color-border-tertiary);
            display: flex;
            gap: 8px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px;
            border: 0.5px solid var(--color-border-tertiary);
            border-radius: 6px;
            font-size: 13px;
        }

        .chat-input-area button {
            background: #8B0000;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .chat-input-area button:hover {
            background: #c0392b;
        }

        .no-chat-selected {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--color-text-secondary);
        }

        .no-chats {
            padding: 20px;
            text-align: center;
            color: var(--color-text-secondary);
        }

        .loading-chats {
            padding: 20px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .chats-container {
                grid-template-columns: 1fr;
                max-height: none;
                height: auto;
            }

            .chats-list {
                border-right: none;
                border-bottom: 1px solid var(--color-border-tertiary);
                max-height: 200px;
            }

            .message-bubble {
                max-width: 80%;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">Astro</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="priests-list.html">Priests</a></li>
                    <li class="nav-item"><a class="nav-link" href="schedule.html">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link active" href="chats.html">Chats</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="section-title"> Messages</h2>

        <div class="chats-container">
            <div class="chats-list">
                <div id="chats-loading" class="loading-chats">
                    <div class="spinner-border spinner-border-sm text-danger"></div>
                </div>
                <div id="chats-list"></div>
                <div id="no-chats" class="no-chats" style="display:none">
                    <p>No conversations yet</p>
                    <p><a href="priests-list.html">Start a conversation</a></p>
                </div>
            </div>


            <div class="chat-area">
                <div id="no-chat-selected" class="no-chat-selected">
                    Select a conversation to start
                </div>

                <div id="chat-content" style="display:none; display:flex; flex-direction:column; height:100%">
                    <div class="chat-header" id="chat-header"></div>
                    <div class="messages-area" id="messages-area"></div>
                    <div class="chat-input-area">
                        <input type="text" id="message-input" placeholder="Type a message...">
                        <button onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let chatsData = [];
        let selectedChatId = null;

        if (!isLoggedIn()) {
            window.location.href = 'login.html';
        }

        async function loadChats() {
            try {
                const res = await fetch(`${BASE_URL}/chats/`, {
                    headers: { "Authorization": `Bearer ${getToken()}` }
                });
                const data = await res.json();

                document.getElementById('chats-loading').style.display = 'none';

                chatsData = data.results || data;
                
                if (!Array.isArray(chatsData) || chatsData.length === 0) {
                    document.getElementById('no-chats').style.display = 'block';
                    return;
                }

                const html = chatsData.map(chat => `
                    <div class="chat-item" onclick="selectChat(${chat.id})">
                        <div class="chat-item-info">
                            <div class="chat-item-name">${chat.purohit_username}</div>
                            <div class="chat-item-preview">${chat.last_message ? chat.last_message.message_text.substring(0, 30) + '...' : 'No messages yet'}</div>
                        </div>
                        ${chat.unread_count > 0 ? `<div class="unread-badge">${chat.unread_count}</div>` : ''}
                    </div>
                `).join('');

                document.getElementById('chats-list').innerHTML = html;

                const params = new URLSearchParams(window.location.search);
                const priestId = params.get('priest_id');
                if (priestId) {
                    startNewChat(priestId);
                }

            } catch (err) {
                console.error('Error loading chats:', err);
                document.getElementById('chats-loading').style.display = 'none';
            }
        }

        async function selectChat(chatId) {
            selectedChatId = chatId;
            const chat = chatsData.find(c => c.id === chatId);

            document.querySelectorAll('.chat-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.chat-item').classList.add('active');

            document.getElementById('no-chat-selected').style.display = 'none';
            document.getElementById('chat-content').style.display = 'flex';

            document.getElementById('chat-header').innerHTML = `
                <h5>${chat.purohit_username}</h5>
            `;

            await loadMessages(chatId);

            await markMessagesRead(chatId);
        }

        async function loadMessages(chatId) {
            try {
                const res = await fetch(`${BASE_URL}/chats/${chatId}/messages/`, {
                    headers: { "Authorization": `Bearer ${getToken()}` }
                });
                const data = await res.json();

                const messages = data.results || data;
                const messagesHtml = messages.map(msg => {
                    const isOwn = msg.sender_username === getUsername();
                    const time = new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    return `
                        <div class="message ${isOwn ? 'own' : 'other'}">
                            <div class="message-bubble">${msg.message_text}</div>
                            <div class="message-time">${time}</div>
                        </div>
                    `;
                }).join('');

                document.getElementById('messages-area').innerHTML = messagesHtml;
                document.getElementById('messages-area').scrollTop = document.getElementById('messages-area').scrollHeight;
            } catch (err) {
                console.error('Error loading messages:', err);
            }
        }

        async function sendMessage() {
            const text = document.getElementById('message-input').value.trim();
            if (!text || !selectedChatId) return;

            try {
                const res = await fetch(`${BASE_URL}/chats/${selectedChatId}/messages/`, {
                    method: 'POST',
                    headers: {
                        "Authorization": `Bearer ${getToken()}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message_text: text })
                });

                if (res.ok) {
                    document.getElementById('message-input').value = '';
                    await loadMessages(selectedChatId);
                }
            } catch (err) {
                console.error('Error sending message:', err);
            }
        }

        async function markMessagesRead(chatId) {
            try {
                await fetch(`${BASE_URL}/chats/${chatId}/mark-read/`, {
                    method: 'PUT',
                    headers: { "Authorization": `Bearer ${getToken()}` }
                });
            } catch (err) {
                console.error('Error marking as read:', err);
            }
        }

        async function startNewChat(priestId) {
            try {
                const res = await fetch(`${BASE_URL}/chats/start/`, {
                    method: 'POST',
                    headers: {
                        "Authorization": `Bearer ${getToken()}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ purohit_id: priestId })
                });

                if (res.ok) {
                    const chat = await res.json();
                    loadChats();
                }
            } catch (err) {
                console.error('Error starting chat:', err);
            }
        }

        function getUsername() {
            return localStorage.getItem('username') || 'user';
        }

        setInterval(() => {
            if (selectedChatId) {
                loadMessages(selectedChatId);
            }
        }, 2000);

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('message-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
        });

        loadChats();
    </script>

</body>
</html>
